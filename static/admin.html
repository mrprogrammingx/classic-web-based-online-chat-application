<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div id="shared-header-placeholder"></div>
  <script>
    // Load canonical header then dispatch event
    (function(){
      const ph = document.getElementById('shared-header-placeholder'); if(!ph) return;
      ph.innerHTML = `<header class="topmenu"><div class="brand">Admin</div><nav class="topnav"><div class="nav-left"><a href="/static/home.html" class="btn btn-secondary" id="btn-home">Home</a><a href="/static/chat.html" class="btn btn-secondary" id="btn-chat">Chat</a></div><div id="user-info" class="user-info" aria-live="polite"></div><div id="notifications" class="nav-notifications"><button id="unread-total" class="unread-total" title="Unread notifications" aria-live="polite" aria-atomic="true"><span class="unread-icon">📨</span><span class="unread-count">0</span></button><span id="unread-live" class="sr-only" aria-live="polite"></span></div><div class="nav-actions"><button id="admin-open" class="btn" style="display:none">Admin panel</button></div></nav></header>`;
      fetch('/static/header.html').then(r=>r.text()).then(html=>{ ph.innerHTML = html; window.dispatchEvent(new Event('shared-header-loaded')); }).catch(()=>{});
    })();
  </script>

  <main class="admin-page">
    <section class="admin-card">
      <header class="admin-card-header">
        <div>
          <h2>Admin Console</h2>
          <p class="muted">Administrative tools and site data. Admin access required to perform actions.</p>
        </div>
        <div class="admin-actions">
          <button id="refresh-admin" class="btn small">Refresh</button>
        </div>
      </header>

      <div id="admin-content" class="admin-content">Loading...</div>
    </section>
  </main>

  <div id="modal-root"></div>
  <div id="toast-root" aria-live="polite"></div>
  <script src="/static/unread.js"></script>
  <script src="/static/main.js"></script>
  <script>
    // Full admin UI: tabs + modal dialogs for actions (ban/unban, remove member, manage admins, view banned users, delete messages, delete room)
    function initAdminUI(){
      if(initAdminUI._init) return; initAdminUI._init = true;
      const el = document.getElementById('admin-content');
      if(!el) return;

      // small HTML-escape helper
  function escapeHtml(str){ return String(str||'').replace(/[&<>'"]/g, (s)=>({ '&':'&amp;','<':'&lt;','>':'&gt;', "'":"&#39;", '"':'&quot;' })[s]); }

      // modal helper (simple promise<boolean> confirmation)
      function showModal(opts){
        return new Promise((resolve)=>{
          let root = document.getElementById('modal-root');
          if(!root){ root = document.createElement('div'); root.id='modal-root'; document.body.appendChild(root); }
          root.innerHTML = '';
          const previouslyFocused = document.activeElement;
          const backdrop = document.createElement('div'); backdrop.className='modal-backdrop';
          const box = document.createElement('div'); box.className='modal-box';
          const title = document.createElement('h3'); const titleId = 'modal-' + Math.random().toString(36).slice(2,9);
          title.id = titleId; title.textContent = opts.title || 'Confirm';
          const body = document.createElement('div'); body.className='modal-body'; body.innerHTML = escapeHtml(opts.body || '');
          const actions = document.createElement('div'); actions.className='modal-actions';
          const cancel = document.createElement('button'); cancel.type='button'; cancel.textContent = opts.cancelText || 'Cancel';
          const confirm = document.createElement('button'); confirm.type='button'; confirm.textContent = opts.confirmText || 'OK'; confirm.className='confirm';
          actions.appendChild(cancel); actions.appendChild(confirm);
          box.appendChild(title); box.appendChild(body); box.appendChild(actions);
          box.setAttribute('role','dialog'); box.setAttribute('aria-modal','true'); box.setAttribute('aria-labelledby', titleId);
          backdrop.appendChild(box); root.appendChild(backdrop);
          function cleanup(){ root.innerHTML = ''; document.removeEventListener('keydown', onKey); try{ if(previouslyFocused && previouslyFocused.focus) previouslyFocused.focus(); }catch(e){} }
          function onKey(e){ if(e.key === 'Escape'){ cleanup(); resolve(false); } else if(e.key === 'Tab'){ e.preventDefault(); confirm.focus(); } }
          cancel.addEventListener('click', ()=>{ cleanup(); resolve(false); });
          confirm.addEventListener('click', ()=>{ cleanup(); resolve(true); });
          backdrop.addEventListener('click', (ev)=>{ if(ev.target === backdrop){ cleanup(); resolve(false); } });
          document.addEventListener('keydown', onKey);
          setTimeout(()=>{ try{ confirm.focus(); }catch(e){} }, 0);
        });
      }

      // fetch helpers with retries and clearer handling for auth/403
      async function apiGetRaw(path){
        try{ const r = await fetch(path, {credentials:'include'}); return r; }catch(e){ return null }
      }
      async function apiGet(path, opts){
        opts = opts || {};
        const maxRetries = opts.retries || 5;
        const retryDelay = opts.retryDelay || 300;
        for(let i=0;i<maxRetries;i++){
          const r = await apiGetRaw(path);
          if(!r){ if(i === maxRetries-1) return { ok:false, status:0, json:null }; await new Promise(res=>setTimeout(res, retryDelay)); continue; }
          if(r.status === 401){ // maybe cookie not set yet; retry briefly
            if(i === maxRetries-1) return { ok:false, status:401, json:null };
            await new Promise(res=>setTimeout(res, retryDelay)); continue;
          }
          if(!r.ok) return { ok:false, status: r.status, json: null };
          const j = await r.json().catch(()=>null);
          return { ok:true, status: r.status, json: j };
        }
        return { ok:false, status:0, json:null };
      }
      async function apiPost(path, body){
        try{ const r = await fetch(path, {method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)}); if(!r.ok) return { ok:false, status: r.status, json: null }; const j = await r.json().catch(()=>null); return { ok:true, status: r.status, json: j }; }catch(e){ return { ok:false, status:0, json:null } }
      }

      // renderers for tabs
      // server-side controls
      let usersFilter = 'all';
      let usersQuery = '';
      let usersPage = 1;
      let usersPerPage = 50;

      async function fetchCounts(){
        const c = await apiGet('/admin/users/counts'); if(c && c.ok && c.json){ return c.json; } return {total:0, admins:0, banned:0};
      }

      async function renderUsers(){
        // show spinner while loading
        el.innerHTML = '<div class="admin-loading"><div class="spinner" aria-hidden="true"></div><div>Loading…</div></div>';
        // fetch counts for labels
        const counts = await fetchCounts();

        // build filter/search/pagination UI
        const ctrl = document.createElement('div'); ctrl.className='admin-controls'; ctrl.style.display='flex'; ctrl.style.gap='8px'; ctrl.style.alignItems='center'; ctrl.style.marginBottom='8px';
        // filters
        const filters = [ ['all', `All (${counts.total||0})`], ['admins', `Admins (${counts.admins||0})`], ['banned', `Banned (${counts.banned||0})`], ['unbanned', 'Unbanned'] ];
        const fb = document.createElement('div'); fb.style.display='flex'; fb.style.gap='6px';
        filters.forEach(([val,label])=>{ const b=document.createElement('button'); b.className='btn small'; b.textContent=label; if(val===usersFilter) b.classList.add('active'); b.addEventListener('click', ()=>{ usersFilter = val; usersPage = 1; renderUsers(); }); fb.appendChild(b); });
        ctrl.appendChild(fb);
        // search box
        const searchWrap = document.createElement('div'); searchWrap.style.display='flex'; searchWrap.style.gap='6px'; searchWrap.style.marginLeft='auto';
        const searchInput = document.createElement('input'); searchInput.placeholder='Search username/email/id'; searchInput.value = usersQuery; searchInput.className='';
        const searchBtn = document.createElement('button'); searchBtn.className='btn small'; searchBtn.textContent='Search';
        searchBtn.addEventListener('click', ()=>{ usersQuery = searchInput.value.trim(); usersPage = 1; renderUsers(); });
        searchInput.addEventListener('keydown', (e)=>{ if(e.key === 'Enter'){ usersQuery = searchInput.value.trim(); usersPage = 1; renderUsers(); } });
        searchWrap.appendChild(searchInput); searchWrap.appendChild(searchBtn);
        ctrl.appendChild(searchWrap);

        el.innerHTML = ''; el.appendChild(ctrl);

        // fetch users with server-side filtering/search/pagination
        const qparams = new URLSearchParams(); if(usersFilter && usersFilter !== 'all') qparams.set('filter', usersFilter); if(usersQuery) qparams.set('q', usersQuery); qparams.set('page', String(usersPage)); qparams.set('per_page', String(usersPerPage));
    const usersResp = await apiGet('/admin/users?' + qparams.toString());
        if(!usersResp || !usersResp.ok){ if(usersResp && usersResp.status === 403){ el.innerHTML = '<div class="admin-empty">Admin access required</div>'; return } if(usersResp && usersResp.status === 401){ el.innerHTML = '<div class="admin-empty">Not authenticated — please log in and try Refresh</div>'; return } el.innerHTML = '<div class="admin-empty">Failed to load users</div>'; return }
  const users = (usersResp.json && usersResp.json.users) || [];
  const total = (usersResp.json && usersResp.json.total) || 0;
  const page = (usersResp.json && usersResp.json.page) || usersPage;
  // banned ids are provided by the users endpoint to avoid an extra request
  const bannedIds = (usersResp.json && usersResp.json.banned_ids) || [];
  const bannedSet = new Set((bannedIds || []).map(x => x));

  if(users.length === 0){ el.innerHTML = '<div class="admin-empty">No users found</div>'; return }
        const table = document.createElement('table'); table.className='admin-list'; table.innerHTML = `<thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Admin</th><th>Actions</th></tr></thead>`;
        const tbody = document.createElement('tbody');

        users.forEach(u=>{
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${u.id}</td><td>${escapeHtml(u.username)}</td><td>${escapeHtml(u.email)}</td><td>${u.is_admin? 'Yes':'No'}</td>`;
          const actionsTd = document.createElement('td'); actionsTd.className='actions';
          const isBanned = bannedSet.has(u.id);
          const banBtn = document.createElement('button'); banBtn.className='btn small'; banBtn.textContent = isBanned ? 'Unban' : 'Ban';
          banBtn.addEventListener('click', async ()=>{
            if(isBanned){
              const ok = await showModal({title:'Unban user', body:`Unban ${escapeHtml(u.username||u.email||u.id)}?`, confirmText:'Unban', cancelText:'Cancel'});
              if(!ok) return;
              const resp = await apiPost('/admin/unban_user', {user_id: u.id});
              if(resp && resp.ok){ showToast('User unbanned','success'); await renderUsers(); } else showToast('Failed to unban','error');
            } else {
              const ok = await showModal({title:'Ban user', body:`Ban ${escapeHtml(u.username||u.email||u.id)}?`, confirmText:'Ban', cancelText:'Cancel'});
              if(!ok) return;
              const res = await apiPost('/admin/ban_user', {user_id: u.id});
              if(res && res.ok) { showToast('User banned','success'); await renderUsers(); } else showToast('Failed to ban','error');
            }
          });

          const adminBtn = document.createElement('button'); adminBtn.className='btn small'; adminBtn.textContent = u.is_admin? 'Revoke admin':'Make admin';
          adminBtn.addEventListener('click', async ()=>{
            const action = u.is_admin? 'Revoke admin':'Make admin';
            const ok = await showModal({title:action, body:`${action} for ${escapeHtml(u.username||u.email||u.id)}?`, confirmText:action, cancelText:'Cancel'});
            if(!ok) return;
            const endpoint = u.is_admin? '/admin/revoke_admin':'/admin/make_admin';
            const res = await apiPost(endpoint, {user_id: u.id});
            if(res && res.ok){ showToast(action + ' successful','success'); await renderUsers(); } else showToast(action + ' failed','error');
          });

          const del = document.createElement('button'); del.className='btn small btn-danger'; del.textContent='Delete';
          del.addEventListener('click', async ()=>{
            const ok = await showModal({title:'Delete user', body:`Delete ${escapeHtml(u.username||u.email||u.id)}? This cannot be undone.`, confirmText:'Delete', cancelText:'Cancel'});
            if(!ok) return;
            const res = await apiPost('/admin/users/delete', {id: u.id});
            if(res && res.ok){ showToast('User deleted','success'); await renderUsers(); } else showToast('Failed to delete','error');
          });

          actionsTd.appendChild(banBtn); actionsTd.appendChild(adminBtn); actionsTd.appendChild(del);
          tr.appendChild(actionsTd); tbody.appendChild(tr);
        });
        table.appendChild(tbody); el.appendChild(table);

        // pagination controls
        const pager = document.createElement('div'); pager.className='admin-pager'; pager.style.display='flex'; pager.style.gap='8px'; pager.style.marginTop='8px';
        const totalPages = Math.max(1, Math.ceil((total||0)/usersPerPage));
        const prev = document.createElement('button'); prev.className='btn small'; prev.textContent='Prev'; prev.disabled = page <= 1; prev.addEventListener('click', ()=>{ if(page>1){ usersPage = page-1; renderUsers(); } });
        const next = document.createElement('button'); next.className='btn small'; next.textContent='Next'; next.disabled = page >= totalPages; next.addEventListener('click', ()=>{ if(page<totalPages){ usersPage = page+1; renderUsers(); } });
        const info = document.createElement('div'); info.className='meta'; info.textContent = `Page ${page} / ${totalPages} — ${total} users`;
        pager.appendChild(prev); pager.appendChild(next); pager.appendChild(info); el.appendChild(pager);
      }

      async function renderBanned(){
        el.innerHTML = '<div class="admin-empty">Loading…</div>';
  const dataResp = await apiGet('/admin/banned');
  if(!dataResp || !dataResp.ok){ if(dataResp && dataResp.status === 403){ el.innerHTML = '<div class="admin-empty">Admin access required</div>'; return } el.innerHTML = '<div class="admin-empty">Failed to load banned users</div>'; return }
  const banned = (dataResp.json && dataResp.json.banned) || [];
        if(banned.length === 0){ el.innerHTML = '<div class="admin-empty">No banned users</div>'; return }
        const table = document.createElement('table'); table.className='admin-list';
        table.innerHTML = `<thead><tr><th>ID</th><th>Username</th><th>Email</th><th>Banned at</th><th>Actions</th></tr></thead>`;
        const tbody = document.createElement('tbody');
        banned.forEach(b=>{
          const tr = document.createElement('tr'); tr.innerHTML = `<td>${b.banned_id}</td><td>${escapeHtml(b.username||'')}</td><td>${escapeHtml(b.email||'')}</td><td>${b.created_at||''}</td>`;
          const actionsTd = document.createElement('td'); actionsTd.className='actions';
          const unban = document.createElement('button'); unban.className='btn small'; unban.textContent='Unban';
          unban.addEventListener('click', async ()=>{
            const ok = await showModal({title:'Unban user', body:`Unban ${escapeHtml(b.username||b.email||b.banned_id)}?`, confirmText:'Unban', cancelText:'Cancel'});
            if(!ok) return;
            const res = await apiPost('/admin/unban_user', {user_id: b.banned_id});
            if(res){ showToast('User unbanned','success'); await renderBanned(); } else showToast('Failed to unban','error');
          });
          actionsTd.appendChild(unban); tr.appendChild(actionsTd); tbody.appendChild(tr);
        });
        table.appendChild(tbody); el.innerHTML = ''; el.appendChild(table);
      }

      async function renderRooms(){
        el.innerHTML = '<div class="admin-empty">Loading…</div>';
  const dataResp = await apiGet('/admin/rooms');
  if(!dataResp || !dataResp.ok){ if(dataResp && dataResp.status === 403){ el.innerHTML = '<div class="admin-empty">Admin access required</div>'; return } el.innerHTML = '<div class="admin-empty">Failed to load rooms</div>'; return }
  const rooms = (dataResp.json && dataResp.json.rooms) || [];
        if(rooms.length === 0){ el.innerHTML = '<div class="admin-empty">No rooms found</div>'; return }
  const table = document.createElement('table'); table.className='admin-list';
  table.innerHTML = `<thead><tr><th>ID</th><th>Name</th><th>Owner</th><th>Members</th><th>Created</th><th>Actions</th></tr></thead>`;
        const tbody = document.createElement('tbody');
        rooms.forEach(r=>{
          const tr = document.createElement('tr'); tr.innerHTML = `<td>${r.id}</td><td>${escapeHtml(r.name)}</td><td>${escapeHtml(r.owner_username||r.owner_id||'')}</td><td>${r.member_count||0}</td><td>${r.created_at||''}</td>`;
          const actionsTd = document.createElement('td'); actionsTd.className='actions';
          const viewMembers = document.createElement('button'); viewMembers.className='btn small'; viewMembers.textContent='Members';
          viewMembers.addEventListener('click', async ()=>{
            // fetch room detail
            const detailsResp = await apiGet(`/rooms/${r.id}`);
            if(!detailsResp || !detailsResp.ok || !detailsResp.json || !detailsResp.json.room){ showToast('Failed to load room members','error'); return }
            const room = detailsResp.json.room;
            // build members list in modal
            const body = document.createElement('div');
            const ul = document.createElement('ul'); ul.style.listStyle='none'; ul.style.padding='0';
            const members = room.members || [];
            if(members.length === 0){ ul.innerHTML = '<li class="admin-empty">No members</li>'; }
            // fetch user info for member ids
            const usersResp = await apiGet(`/users?ids=${encodeURIComponent(members.join(','))}`);
            const users = (usersResp && usersResp.users) || [];
            const nameById = {}; users.forEach(u=> nameById[String(u.id)] = u.username || u.email || ('user'+u.id));
            members.forEach(mid=>{
              const li = document.createElement('li'); li.style.padding='8px'; li.style.display='flex'; li.style.justifyContent='space-between';
              const name = nameById[String(mid)] || ('user'+mid);
              li.innerHTML = `<div><strong>${escapeHtml(name)}</strong><div class="meta">id: ${mid}</div></div>`;
              const act = document.createElement('div'); act.className='actions';
              const remove = document.createElement('button'); remove.className='btn small btn-danger'; remove.textContent='Remove';
              remove.addEventListener('click', async ()=>{
                const ok = await showModal({title:'Remove member', body:`Remove ${escapeHtml(name)} from room ${escapeHtml(r.name)}?`, confirmText:'Remove', cancelText:'Cancel'});
                if(!ok) return;
                const res = await apiPost('/admin/remove_member', {room_id: r.id, user_id: mid});
                if(res){ showToast('Member removed','success'); li.remove(); } else showToast('Failed to remove member','error');
              });
              act.appendChild(remove); li.appendChild(act); ul.appendChild(li);
            });
            body.appendChild(ul);
            await showModal({title:`Members of ${r.name}`, body: ''});
            // show a custom modal by injecting our body into modal-root
            const root = document.getElementById('modal-root') || (function(){ const rt=document.createElement('div'); rt.id='modal-root'; document.body.appendChild(rt); return rt; })();
            root.innerHTML = '';
            const backdrop = document.createElement('div'); backdrop.className='modal-backdrop';
            const box = document.createElement('div'); box.className='modal-box';
            const title = document.createElement('h3'); title.textContent = `Members of ${r.name}`;
            const actions = document.createElement('div'); actions.className='modal-actions';
            const close = document.createElement('button'); close.type='button'; close.textContent='Close';
            actions.appendChild(close);
            box.appendChild(title); box.appendChild(body); box.appendChild(actions); backdrop.appendChild(box); root.appendChild(backdrop);
            close.addEventListener('click', ()=> root.innerHTML='');
          });

          const del = document.createElement('button'); del.className='btn small btn-danger'; del.textContent='Delete room';
          del.addEventListener('click', async ()=>{
            // fetch room detail to show confirmation including member count
            const detailsResp = await apiGet(`/rooms/${r.id}`);
            let bodyText = `Delete room ${escapeHtml(r.name)}? This cannot be undone.`;
            if(detailsResp && detailsResp.ok && detailsResp.json && detailsResp.json.room){
              const rm = detailsResp.json.room;
              bodyText = `Delete room ${escapeHtml(r.name)}? Members: ${rm.members?rm.members.length:0}. This cannot be undone.`;
            }
            const ok = await showModal({title:'Delete room', body: bodyText, confirmText:'Delete', cancelText:'Cancel'});
            if(!ok) return;
            const res = await apiPost('/admin/delete_room', {room_id: r.id});
            if(res && res.ok){ const deleted = (res.json && res.json.deleted) || {}; showToast('Room deleted — ' + (deleted.messages||0) + ' messages removed','success'); await renderRooms(); } else showToast('Failed to delete room','error');
          });

          actionsTd.appendChild(viewMembers); actionsTd.appendChild(del);
          tr.appendChild(actionsTd); tbody.appendChild(tr);
        });
        table.appendChild(tbody); el.innerHTML=''; el.appendChild(table);
      }

      async function renderMessages(){
        el.innerHTML = '<div class="admin-loading"><div class="spinner" aria-hidden="true"></div><div>Loading messages…</div></div>';
        // controls: search and pagination
        let q = '';
        let page = 1;
        const per_page = 20;

        async function load(){
          el.innerHTML = '';
          const ctrl = document.createElement('div'); ctrl.style.display='flex'; ctrl.style.gap='8px'; ctrl.style.alignItems='center'; ctrl.style.marginBottom='8px';
          const search = document.createElement('input'); search.placeholder = 'Search message text or id'; search.value = q;
          const sbtn = document.createElement('button'); sbtn.className='btn small'; sbtn.textContent='Search';
          sbtn.addEventListener('click', ()=>{ q = search.value.trim(); page = 1; load(); });
          search.addEventListener('keydown', (e)=>{ if(e.key === 'Enter'){ q = search.value.trim(); page = 1; load(); } });
          ctrl.appendChild(search); ctrl.appendChild(sbtn);
          el.appendChild(ctrl);

          const listWrap = document.createElement('div'); listWrap.className='admin-list-wrap'; el.appendChild(listWrap);

          const params = new URLSearchParams(); params.set('page', String(page)); params.set('per_page', String(per_page)); if(q) params.set('q', q);
          const resp = await apiGet('/admin/messages?' + params.toString());
          if(!resp || !resp.ok){ el.innerHTML = '<div class="admin-empty">Failed to load messages</div>'; return }
          const msgs = (resp.json && resp.json.messages) || [];
          const total = (resp.json && resp.json.total) || 0;

          if(msgs.length === 0){ listWrap.innerHTML = '<div class="admin-empty">No messages</div>'; return }
          const table = document.createElement('table'); table.className='admin-list'; table.innerHTML = `<thead><tr><th>ID</th><th>Room</th><th>Author</th><th>Text</th><th>Created</th><th>Actions</th></tr></thead>`;
          const tbody = document.createElement('tbody');
          msgs.forEach(m => {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td>${m.id}</td><td>${escapeHtml(m.room_name||m.room_id||'')}</td><td>${escapeHtml(m.username||m.user_id||'')}</td><td>${escapeHtml((m.text||'').slice(0,200))}</td><td>${m.created_at||''}</td>`;
            const actions = document.createElement('td'); actions.className='actions';
            const del = document.createElement('button'); del.className='btn small btn-danger'; del.textContent='Delete';
            del.addEventListener('click', async ()=>{
              const ok = await showModal({title:'Delete message', body:`Delete message ${m.id} from ${escapeHtml(m.room_name||m.room_id||'')} by ${escapeHtml(m.username||m.user_id||'')}?`, confirmText:'Delete', cancelText:'Cancel'});
              if(!ok) return;
              const res = await apiPost('/admin/delete_message', {message_id: m.id});
              if(res && res.ok){ const deleted = (res.json && res.json.deleted) || {}; showToast('Deleted: ' + (deleted.messages||0) + ' messages, ' + (deleted.message_files||0) + ' files','success'); load(); } else showToast('Failed to delete message','error');
            });
            actions.appendChild(del); tr.appendChild(actions); tbody.appendChild(tr);
          });
          table.appendChild(tbody); listWrap.appendChild(table);

          // pager
          const pager = document.createElement('div'); pager.className='admin-pager'; pager.style.display='flex'; pager.style.gap='8px'; pager.style.marginTop='8px';
          const totalPages = Math.max(1, Math.ceil(total / per_page));
          const prev = document.createElement('button'); prev.className='btn small'; prev.textContent='Prev'; prev.disabled = page <= 1; prev.addEventListener('click', ()=>{ if(page>1){ page--; load(); } });
          const next = document.createElement('button'); next.className='btn small'; next.textContent='Next'; next.disabled = page >= totalPages; next.addEventListener('click', ()=>{ if(page<totalPages){ page++; load(); } });
          const info = document.createElement('div'); info.className='meta'; info.textContent = `Page ${page} / ${totalPages} — ${total} messages`;
          pager.appendChild(prev); pager.appendChild(next); pager.appendChild(info); el.appendChild(pager);
        }

        load();
      }

      // build tab bar UI inside admin-content
      const tabsBar = document.createElement('div'); tabsBar.className='admin-tabs'; tabsBar.style.display='flex'; tabsBar.style.gap='8px'; tabsBar.style.marginBottom='12px';
      const tUsers = document.createElement('button'); tUsers.className='btn small'; tUsers.textContent='Users';
      const tBanned = document.createElement('button'); tBanned.className='btn small'; tBanned.textContent='Banned';
      const tRooms = document.createElement('button'); tRooms.className='btn small'; tRooms.textContent='Rooms';
      const tMessages = document.createElement('button'); tMessages.className='btn small'; tMessages.textContent='Messages';
      tabsBar.appendChild(tUsers); tabsBar.appendChild(tBanned); tabsBar.appendChild(tRooms); tabsBar.appendChild(tMessages);
      // replace content with tabs and a container area
      el.innerHTML = '';
      el.appendChild(tabsBar);
      const container = document.createElement('div'); container.id = 'admin-tab-container'; el.appendChild(container);

      // tab wiring
      function setActive(btn){ Array.from(tabsBar.children).forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
      tUsers.addEventListener('click', ()=>{ setActive(tUsers); renderUsers(); });
      tBanned.addEventListener('click', ()=>{ setActive(tBanned); renderBanned(); });
      tRooms.addEventListener('click', ()=>{ setActive(tRooms); renderRooms(); });
      tMessages.addEventListener('click', ()=>{ setActive(tMessages); renderMessages(); });

      // initial
      tUsers.click();

      // wire refresh
      const refresh = document.getElementById('refresh-admin'); if(refresh) refresh.addEventListener('click', ()=>{ const active = document.querySelector('.admin-tabs .active'); if(active) active.click(); else tUsers.click(); });
    }

    // Initialize immediately in case the shared-header-loaded event already fired.
    window.addEventListener('shared-header-loaded', initAdminUI);
    // call now (safe-guarded inside initAdminUI)
    initAdminUI();
  </script>
</body>
</html>
