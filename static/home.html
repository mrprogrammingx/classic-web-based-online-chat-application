<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Home</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topmenu">
    <div class="brand">Presence demo</div>
    <nav class="topnav">
      <a href="/static/index.html" class="btn btn-secondary" id="btn-back-to-chat">Chat</a>
    </nav>
  </header>
  <div id="me">
    <p>Signed in as <span id="me-name"></span></p>
  <p>Presence: <span id="my-presence-dot" class="presence-dot"></span><span id="my-presence">unknown</span></p>
    <button id="admin-open" class="btn">Admin</button>
    <div id="admin-modal" class="admin-modal" style="display:none">
      <h3>Admin - Users</h3>
      <button id="admin-close" class="btn">Close</button>
      <ul id="admin-users"></ul>
    </div>
    <button id="list-sessions" class="btn btn-secondary">List sessions</button>
    <ul id="sessions"></ul>
    <button id="logout" class="btn btn-primary">Logout</button>
    <h3>Friends</h3>
    <div id="status" class="status-box hidden"></div>
  <div class="mb-8"><button id="debug-inspect" class="btn small">Debug Inspect</button></div>
    <div>
      <input id="friend-id-input" placeholder="friend id" />
      <button id="add-friend" class="btn">Add</button>
    </div>
    <div class="mt-8">
      <input id="friend-username-input" placeholder="friend username" />
      <button id="request-by-username" class="btn">Send Request</button>
    </div>
    <h4>Incoming Requests</h4>
    <ul id="incoming-requests"></ul>
    <ul id="friends-list"></ul>
  </div>

  <!-- roots for shared UI (modals, toasts) -->
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-container" aria-live="polite" role="status"></div>

  <script src="/static/main.js"></script>
</body>
</html>
