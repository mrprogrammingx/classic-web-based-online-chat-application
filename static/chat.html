<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat — Demo UI</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topmenu">
    <div class="brand">Chat Demo</div>
    <nav class="topnav">
      <div class="nav-left">
        <a href="/static/home.html" class="btn btn-secondary" id="btn-home">Home</a>
        <a href="/static/admin.html" class="btn" id="btn-admin-link">Admin</a>
        <button id="btn-new-room" class="btn btn-primary">New Room</button>
      </div>

      <div id="user-info" class="user-info" aria-live="polite">
        <!-- populated by app.js when user is authenticated -->
      </div>

      <div id="notifications" class="nav-notifications">
        <button id="unread-total" class="unread-total" title="Unread notifications" aria-live="polite" aria-atomic="true"><span class="unread-icon">📨</span><span class="unread-count">0</span></button>
        <span id="unread-live" class="sr-only" aria-live="polite"></span>
      </div>

      <div class="nav-actions">
  <button id="admin-open" class="btn" style="display:none">Admin panel</button>
        <button id="btn-logout" class="btn">Logout</button>
      </div>
    </nav>
  </header>

  <div class="app-grid">
    <main class="messages-area">
      <div class="messages-header">
        <h2 id="room-title">Select a room</h2>
      </div>
      <div id="messages" class="messages"></div>
      <form id="composer" class="composer" action="#">
        <div id="reply-preview" class="reply-preview" style="display:none">
          <small>Replying to <span id="reply-to-author"></span></small>
          <div id="reply-to-text" class="reply-text"></div>
          <button id="reply-cancel" type="button" aria-label="Cancel reply">✕</button>
        </div>
        <div class="composer-controls">
          <button id="emoji-btn" type="button" class="emoji-btn" title="Insert emoji">😊</button>
          <input id="file-input" type="file" class="file-input" />
        </div>
        <textarea id="message-input" placeholder="Write a message... (Shift+Enter for newline)" rows="2"></textarea>
        <div class="composer-actions">
          <button id="send-btn" type="submit">Send</button>
        </div>
      </form>
    </main>

    <aside class="rightbar">
      <section class="rooms" id="rooms-section">
        <h3 class="rooms-header">Rooms <button id="rooms-toggle" aria-label="Toggle rooms">▾</button></h3>
        <ul id="rooms-list"></ul>
      </section>
      <section class="contacts">
        <h3>Contacts</h3>
        <ul id="contacts-list"></ul>
      </section>
      <section class="members">
        <h3>Members</h3>
        <ul id="members-list"></ul>
      </section>
    </aside>
  </div>

  <script src="/static/unread.js"></script>
  <script src="/static/app.js" defer></script>
  <div id="emoji-picker" class="emoji-picker" aria-hidden="true"></div>
  <div id="uploading-indicator" class="uploading-indicator">Uploading...</div>
  <div id="modal-root" aria-hidden="true"></div>
  <div id="toast-root" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
