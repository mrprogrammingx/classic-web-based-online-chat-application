<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat — Demo UI</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="shared-header-placeholder"></div>

  <div class="app-grid">
    <main class="messages-area">
      <div class="messages-header">
        <h2 id="room-title">Select a room</h2>
      </div>
      <div id="messages" class="messages"></div>
      <form id="composer" class="composer" action="#">
        <div id="reply-preview" class="reply-preview" style="display:none">
          <small>Replying to <span id="reply-to-author"></span></small>
          <div id="reply-to-text" class="reply-text"></div>
          <button id="reply-cancel" type="button" aria-label="Cancel reply">✕</button>
        </div>
        <div class="composer-controls">
          <button id="emoji-btn" type="button" class="emoji-btn" title="Insert emoji">😊</button>
          <input id="file-input" type="file" class="file-input" />
        </div>
        <textarea id="message-input" placeholder="Write a message... (Shift+Enter for newline)" rows="2"></textarea>
        <div class="composer-actions">
          <button id="send-btn" type="submit">Send</button>
        </div>
      </form>
      <!-- shown instead of the composer when the user is not a member of the selected room -->
      <div id="join-bar" class="join-bar" style="display:none" aria-live="polite">
        <span class="join-bar-text">You are not a member of this room.</span>
        <button id="join-bar-btn" type="button" class="btn-join">Join Room</button>
      </div>
    </main>

    <aside class="rightbar">
      <section class="my-rooms" id="my-rooms-section">
        <h3 class="rooms-header">My Rooms</h3>
        <ul id="my-rooms-list"></ul>
      </section>
      <section class="rooms" id="rooms-section">
        <h3 class="rooms-header">Rooms <button id="rooms-toggle" aria-label="Toggle rooms">▾</button></h3>
        <div class="rooms-search">
          <input id="rooms-search-input" type="text" placeholder="Search rooms…" autocomplete="off" />
        </div>
        <ul id="rooms-list"></ul>
      </section>
      <section class="contacts">
        <h3>Contacts</h3>
        <ul id="contacts-list"></ul>
      </section>
      <section class="members">
        <h3>Members</h3>
        <ul id="members-list"></ul>
      </section>
      <section id="invitations-section" class="invitations-section" style="display:none">
        <h3 class="invitations-header">Pending Invitations</h3>
        <ul id="invitations-list" class="invitations-list"></ul>
      </section>
    </aside>
  </div>

  <script src="/static/site-config.js"></script>
  <!-- load header fragment and visibility helper so pages include consistent header -->
  <script src="/static/header/header-loader.js"></script>
  <script src="/static/header/header-visibility.js"></script>
  <script src="/static/unread.js"></script>
  <script src="/static/main.js"></script>
  <script src="/static/app/lib/index.js"></script>
  <script src="/static/app/data/api.js"></script>
  <!-- presence is provided by the lib bundle (static/app/lib/index.js) -->
  <script src="/static/app/data/rooms.js"></script>
  <script src="/static/app/data/messages.js"></script>
  <script src="/static/app/ui/ui.js"></script>
  <script src="/static/app/ui/contacts-ui.js"></script>
  
  <script src="/static/app/ui/emoji.js"></script>
  <script src="/static/app/ui/attachments.js"></script>
  <script src="/static/app/ui/admin.js"></script>
  <script src="/static/app/ui/invitations.js"></script>
  <script src="/static/app/bootstrap.js"></script>
  <script src="/static/app/ui/messages-ui.js"></script>
  <script src="/static/app/data/i18n.js"></script>
  
  <script src="/static/app/ui/composer-ui.js"></script>
  <script src="/static/app.js" defer></script>
  <script>
    // Ensure the home button uses the canonical href from SITE_CONFIG
    try{ (function(){ var el = document.getElementById('btn-home'); if(el){ var h = (window.SITE_CONFIG && window.SITE_CONFIG.homeHref) ? window.SITE_CONFIG.homeHref : '/static/home.html'; el.setAttribute('href', h); } })(); }catch(e){}
  </script>
  <div id="emoji-picker" class="emoji-picker" aria-hidden="true"></div>
  <div id="uploading-indicator" class="uploading-indicator">Uploading...</div>
  <div id="modal-root" aria-hidden="true"></div>
  <div id="toast-root" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
