<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Presence Demo</title>
</head>
<body>
  <h1>Presence demo</h1>
  <div id="auth">
    <input id="email" placeholder="email" />
    <input id="username" placeholder="username" />
    <input id="password" placeholder="password" type="password" />
    <button id="register">Register</button>
    <button id="login">Login</button>
  </div>

  <div id="me" style="display:none">
    <p>Signed in as <span id="me-name"></span></p>
    <p>Presence: <span id="my-presence">unknown</span></p>
    <button id="admin-open" style="display:none">Admin</button>
    <div id="admin-modal" style="display:none; position:fixed; left:20%; top:20%; width:60%; background:#fff; border:1px solid #ccc; padding:10px;">
      <h3>Admin - Users</h3>
      <button id="admin-close">Close</button>
      <ul id="admin-users"></ul>
    </div>
    <button id="list-sessions">List sessions</button>
    <ul id="sessions"></ul>
    <button id="logout">Logout</button>
  </div>

  <script src="/static/main.js"></script>
</body>
</html>
