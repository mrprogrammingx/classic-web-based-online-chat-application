name: Playwright tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps

      - name: Start server (TEST_MODE=1)
        env:
          TEST_MODE: '1'
        run: |
          # start uvicorn in background and capture logs
          mkdir -p test-logs
          (TEST_MODE=1 python -m uvicorn app:app --host 127.0.0.1 --port 8000 &> test-logs/server.log &) || true
          echo $! > test-logs/server.pid || true

      - name: Wait for server to accept connections
        run: |
          python - <<'PY'
import socket, time, sys
host='127.0.0.1'
port=8000
for i in range(60):
    try:
        s=socket.socket(); s.settimeout(1);
        s.connect((host, port)); s.close();
        print('server listening')
        break
    except Exception:
        time.sleep(1)
else:
    print('server did not start in time', file=sys.stderr)
    sys.exit(1)
PY

      - name: Run Playwright tests
        id: playwright
        run: |
          npm run test:playwright --if-present || true

      - name: Upload Playwright artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-logs/server.log
            playwright-report/**
            playwright-traces/**
            playwright-screenshots/**
            tests-results/**
name: Playwright E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Install npm deps
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Start server
        run: |
          # start server in background and stream logs to a tempfile
          python -m uvicorn app:app &>/tmp/chat-server.log &
          # wait for the server to respond (max ~30s)
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/ >/dev/null 2>&1; then
              echo "server ready"
              break
            fi
            echo "waiting for server... ($i)"
            sleep 1
          done
      - name: Run Playwright tests
        run: npx playwright test tests/e2e/playwright/reply_preview.spec.js --reporter=list
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '0'

      # Upload artifacts (report, traces, screenshots) for debugging on failure or success
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/**
            playwright-traces/**
            playwright-screenshots/**
            test-results/**
