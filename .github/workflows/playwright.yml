name: Playwright tests

on: [push, pull_request]

jobs:
  test-playwright:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/mrprogrammingx/classic-web-based-online-chat-application.git .
      - run: python3 -m pip install -q -r requirements.txt
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: TEST_MODE=1 python3 -m uvicorn app:app --host 127.0.0.1 --port 8000 &
      - run: sleep 5 && npm run test:playwright --if-present || true

