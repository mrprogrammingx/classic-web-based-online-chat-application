name: Playwright E2E

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Install npm deps
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Start server
        run: |
          # start server in background and stream logs to a tempfile
          python -m uvicorn app:app &>/tmp/chat-server.log &
          # wait for the server to respond (max ~30s)
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:8000/ >/dev/null 2>&1; then
              echo "server ready"
              break
            fi
            echo "waiting for server... ($i)"
            sleep 1
          done
      - name: Run Playwright tests
        run: npx playwright test tests/playwright/reply_preview.spec.js --reporter=list
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '0'

      # Upload artifacts (report, traces, screenshots) for debugging on failure or success
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            playwright-traces
            playwright-screenshots
            test-results
