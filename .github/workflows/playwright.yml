name: Playwright tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Install Playwright browsers
        run: |
          npx playwright install --with-deps

      - name: Start server (TEST_MODE=1)
        env:
          TEST_MODE: '1'
        run: |
          # start uvicorn in background and capture logs
          mkdir -p test-logs
          (TEST_MODE=1 python -m uvicorn app:app --host 127.0.0.1 --port 8000 &> test-logs/server.log &) || true
          echo $! > test-logs/server.pid || true

      - name: Wait for server to accept connections
        run: |
          for i in {1..60}; do
            if curl -sSf http://127.0.0.1:8000/ >/dev/null 2>&1; then
              echo "✅ server listening on port 8000"
              exit 0
            fi
            echo "⏳ waiting for server... ($i/60)"
            sleep 1
          done
          echo "❌ server did not start in time"
          cat test-logs/server.log 2>/dev/null || true
          exit 1

      - name: Run Playwright tests
        id: playwright
        run: |
          npm run test:playwright --if-present || true

      - name: Upload Playwright artifacts on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-logs/server.log
            playwright-report/**
            playwright-traces/**
            playwright-screenshots/**
            tests-results/**

      - name: Upload Playwright artifacts on success
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-success
          path: |
            playwright-report/**
            playwright-traces/**
            playwright-screenshots/**
            test-results/**
