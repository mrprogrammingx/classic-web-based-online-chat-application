name: pytest

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install lint/type tools (dev requirements if present)
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; else pip install flake8 mypy black; fi

      - name: Run black (check)
        run: |
          black --check .

      - name: Run flake8
        run: |
          # exclude virtualenv and large third-party dirs
          flake8 . --exclude .venv --max-line-length=120

      - name: Run mypy (typing)
        run: |
          # ignore missing imports for third-party libs to avoid CI noise
          mypy --ignore-missing-imports .

      - name: Run tests
        run: pytest -q
