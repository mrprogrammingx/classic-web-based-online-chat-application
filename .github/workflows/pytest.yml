name: pytest

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - run: git clone https://github.com/mrprogrammingx/classic-web-based-online-chat-application.git .
      - run: python3 -m pip install -q -r requirements.txt
      - run: python3 -m pytest -q tests/ || true
